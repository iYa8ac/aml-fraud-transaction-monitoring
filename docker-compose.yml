services:
  postgres:
    image: "postgres:17"
    container_name: "postgres"
    environment:
      POSTGRES_PASSWORD: SuperSecretPasswordToChangeForPg
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - default
  redis:
    image: "redis/redis-stack:latest"
    container_name: "redis"
    volumes:
      - redis:/data
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - default
    environment:
      REDIS_ARGS: --appendonly yes
  jube.webapi:
    image: jube.app
    container_name: "jube.webapi"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    links:
      - redis
      - postgres
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ConnectionString=Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=SuperSecretPasswordToChangeForPg;Pooling=true;Minimum Pool Size=0;Maximum Pool Size=100;
      - ReportConnectionString=Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=SuperSecretPasswordToChangeForPg;Pooling=true;Minimum Pool Size=0;Maximum Pool Size=100;
      - EnableSandbox=False
      - JWTKey=IMPORTANT:_ChangeThisKey_~%pvif3KRo!3Mkm1oMC50TvAPi%{mUt<9sBm>DPjGZyfYYWssseVrNUqLQE}mz{L_UsingThisKeyIsDangerous
      - RedisConnectionString=redis
      - EnableExhaustiveTraining=False
      - Landlord=True
      - EnableReprocessing=False
      - EnableSanctionLoader=False
      - CachePruneServer=False
      - EnableTtlCounter=False
      - EnableSearchKeyCache=False
      - EnableCasesAutomation=False
      - PasswordHashingKey=IMPORTANT:_ChangeThisKey_~%pvif3KRo!3Mkm1oMC50TvAPi%{mUt<9sBm>DPjGZyfYYWssseVrNUqLQE}mz{L_UsingThisKeyIsDangerous
      - EnableMigration=True
      - Log4NetLogLevel=ERROR
      - DOTNET_GC_SERVER=1
      - DOTNET_GCDynamicAdaptationMode=1
    ports:
      - "5001:5001"
    networks:
      - default
    build:
      context: .
      dockerfile: Jube.App/Dockerfile
  jube.jobs:
    image: jube.app
    container_name: "jube.jobs"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    links:
      - redis
      - postgres
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ConnectionString=Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=SuperSecretPasswordToChangeForPg;Pooling=true;Minimum Pool Size=0;Maximum Pool Size=100;
      - ReportConnectionString=Host=postgres;Port=5432;Database=postgres;Username=postgres;Password=SuperSecretPasswordToChangeForPg;Pooling=true;Minimum Pool Size=0;Maximum Pool Size=100;
      - RedisConnectionString=redis
      - JWTKey=IMPORTANT:_ChangeThisKey_~%pvif3KRo!3Mkm1oMC50TvAPi%{mUt<9sBm>DPjGZyfYYWssseVrNUqLQE}mz{L_UsingThisKeyIsDangerous
      - EnableExhaustiveTraining=True
      - EnableReprocessing=True
      - EnableSanctionLoader=True
      - CachePruneServer=True
      - EnableTtlCounter=True
      - EnableSearchKeyCache=True
      - EnableCasesAutomation=True
      - StreamingActivationWatcher=False
      - EnableCallback=True
      - EnablePublicInvokeController=True
      - PasswordHashingKey=IMPORTANT:_ChangeThisKey_~%pvif3KRo!3Mkm1oMC50TvAPi%{mUt<9sBm>DPjGZyfYYWssseVrNUqLQE}mz{L_UsingThisKeyIsDangerous
      - EnableMigration=False
      - Log4NetLogLevel=ERROR
      - DOTNET_GC_SERVER=1
      - DOTNET_GCDynamicAdaptationMode=1
    networks:
      - default
    build:
      context: .
      dockerfile: Jube.App/Dockerfile
networks:
  default:
    driver: bridge
volumes:
  postgres:
    external: false
  redis:
    external: false